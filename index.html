<!doctype HTML>
<html>
    <head>
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    </head>
    <script src="https://aframe.io/releases/0.9.0/aframe.min.js"></script>
    <script src="https://rawgit.com/jeromeetienne/AR.js/master/aframe/build/aframe-ar.min.js"></script>
    <script src="https://rawgit.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
    
    <body style='margin : 0px; overflow: hidden;'>
       
        <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false;'>

        <a-assets>
            <a-asset-item id="animated-asset" src="https://github.com/deceitfulchocomint/Assets-for-AR/blob/main/Glb.Pudding.glb"></a-asset-item>
        </a-assets>

        <a-marker type="pattern" preset="custom" url="https://github.com/deceitfulchocomint/Assets-for-AR/raw/refs/heads/main/Product%20Image%20Tracker.patt">
           <a-entity gltf-model="#my-animated-asset" scale="2"></a-entity>
        </a-marker>

        <a-marker id="animated-marker" type="pattern" preset="custom" url="https://github.com/deceitfulchocomint/Assets-for-AR/raw/refs/heads/main/Product%20Image%20Tracker.patt">
            <a-entity
                gltf-model="#animated-asset"
                scale="2">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
        </a-scene>
    </body>
</html>
