<!doctype HTML>
<html>
<head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
</head>
<body style='margin : 0px; overflow: hidden;'>
    <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false;'>
        
        <a-assets>
            <a-asset-item id="Pudding-Asset" src="https://github.com/deceitfulchocomint/Assets-for-AR/raw/main/Glb.Pudding.glb"></a-asset-item>
        </a-assets>

        <a-marker type="pattern" preset="custom" url="https://github.com/deceitfulchocomint/Assets-for-AR/raw/refs/heads/main/Product%20Image%20Tracker.patt">
            <a-entity gltf-model="#Pudding-Asset" scale="2" position="0 0 0"></a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
